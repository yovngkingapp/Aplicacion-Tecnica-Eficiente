<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instrucción de Posición</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000;
            overflow: hidden;
        }
        /* Esto hace que el video se comporte como un GIF visualmente */
        video {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
    </style>
</head>
<body>

    <!-- 
        IMPORTANTE: 
        'autoplay' lo inicia solo.
        'muted' es obligatorio en Chrome para que el autoplay funcione.
        'loop' hace que se repita infinitamente.
        'playsinline' es vital para que funcione en móviles sin abrirse en pantalla completa.
    -->
    <video autoplay muted loop playsinline id="miVideo">
        <source src="https://i.ibb.co/MDK3TVLH/Realiza-el-video-posicin-inicial-coloca-am.gif" type="video/mp4">
        Tu navegador no soporta este formato.
    </video>

</body>
</html>
