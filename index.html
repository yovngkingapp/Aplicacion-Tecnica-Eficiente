<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador de GIF</title>
    <style>
        /* Estilos para que el GIF ocupe toda la pantalla y esté centrado */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000; /* Fondo negro */
            overflow: hidden;
        }

        img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain; /* Mantiene la proporción sin deformar */
        }
    </style>
</head>
<body>

    <!-- Enlace directo al GIF de tu Drive -->
    <img src="https://drive.google.com/uc?export=download&id=1UowUDXXLuzTC9LqVYdowCAtPqK9t4R68" 
         alt="GIF animado">

</body>
</html>
