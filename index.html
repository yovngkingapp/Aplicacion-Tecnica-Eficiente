<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instrucciones de Posición</title>
    <style>
        /* Elimina márgenes y asegura que el fondo sea limpio */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000; /* Fondo negro para resaltar el GIF */
            overflow: hidden; /* Evita barras de desplazamiento */
        }

        /* Estilo para que el GIF sea responsivo */
        img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain; /* Mantiene la proporción original */
        }
    </style>
</head>
<body>

    <img src="https://i.ibb.co/MDK3TVLH/Realiza-el-video-posicin-inicial-coloca-am.gif" 
         alt="Instrucción de posición inicial">

</body>
</html>
