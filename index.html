<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador GIF</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000;
        }
        img {
            width: 100vw;
            height: 100vh;
            object-fit: contain; /* Esto evita que el gif se deforme */
        }
    </style>
</head>
<body>

    <!-- Método de visualización directa de Drive -->
    <img src="https://lh3.googleusercontent.com/u/0/d/1UowUDXXLuzTC9LqVYdowCAtPqK9t4R68" 
         alt="Cargando GIF..."
         onerror="this.src='https://drive.google.com/thumbnail?id=1UowUDXXLuzTC9LqVYdowCAtPqK9t4R68&sz=w1000';">

</body>
</html>
